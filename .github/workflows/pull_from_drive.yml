name: Pull Google Drive write folder

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pull-google-drive-write
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout write repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Restore rclone configuration
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          mkdir -p "$HOME/.config/rclone"

          printf '%s' "$RCLONE_CONFIG_BASE64" \
            | base64 --decode \
            > "$HOME/.config/rclone/rclone.conf"

          chmod 600 "$HOME/.config/rclone/rclone.conf"

          echo "Configured remotes:"
          rclone listremotes \
            --config "$HOME/.config/rclone/rclone.conf"

      - name: Download Google Drive write folder
        run: |
          TEMP_DIR="$RUNNER_TEMP/google_drive_write"

          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          rclone copy \
            "gdrive:write" \
            "$TEMP_DIR" \
            --config "$HOME/.config/rclone/rclone.conf" \
            --exclude "/.git/**" \
            --exclude "/.github/**" \
            --create-empty-src-dirs \
            --stats 10s \
            --stats-one-line \
            --stats-log-level NOTICE

          echo "Downloaded files:"
          find "$TEMP_DIR" -type f | wc -l

      - name: Check GitHub file size limit
        run: |
          TEMP_DIR="$RUNNER_TEMP/google_drive_write"

          LARGE_FILES="$(find "$TEMP_DIR" -type f -size +99M -print)"

          if [ -n "$LARGE_FILES" ]; then
            echo "The following files are too large for normal GitHub storage:"
            echo "$LARGE_FILES"
            echo "GitHub blocks individual files larger than 100 MiB."
            exit 1
          fi

      - name: Mirror files into repository
        run: |
          TEMP_DIR="$RUNNER_TEMP/google_drive_write"

          rsync -a \
            --delete \
            --itemize-changes \
            --exclude=".git/" \
            --exclude=".github/" \
            "$TEMP_DIR/" \
            "$GITHUB_WORKSPACE/"

      - name: Commit and push changes
        run: |
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Google Drive write folder has no changes."
            exit 0
          fi

          git commit -m "Sync from Google Drive write"

          git push origin \
            "HEAD:${{ github.event.repository.default_branch }}"
